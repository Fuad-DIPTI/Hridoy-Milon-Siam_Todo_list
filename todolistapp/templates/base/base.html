<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #21242f;
            --bg-card-hover: #282c3a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2e3345;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Ambient Background --- */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 12s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatBlob {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(60px, 40px) scale(1.1); }
            100% { transform: translate(-30px, 70px) scale(0.95); }
        }

        /* --- Navbar --- */
        .navbar-custom {
            background: rgba(26, 29, 39, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand-custom {
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .navbar-brand-custom .brand-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #fff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .nav-link-custom {
            color: var(--text-secondary) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 1rem !important;
            border-radius: 10px;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: var(--text-primary) !important;
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-link-custom.active {
            color: var(--accent-hover) !important;
        }

        /* --- Cards --- */
        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .card-custom:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* --- Stat Cards --- */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat-card .stat-number {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- Task Items --- */
        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            animation: slideIn 0.35s ease forwards;
        }

        .task-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateX(4px);
        }

        .task-item.completed-task {
            opacity: 0.55;
        }

        .task-item.completed-task .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Custom Checkbox --- */
        .custom-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 7px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            color: transparent;
            font-size: 0.75rem;
        }

        .custom-check:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .custom-check.checked {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        /* --- Form Controls --- */
        .form-control-custom {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            color: var(--text-primary) !important;
            padding: 0.7rem 1rem !important;
            font-size: 0.9rem !important;
            transition: all 0.25s ease !important;
        }

        .form-control-custom:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
            outline: none !important;
        }

        .form-control-custom::placeholder {
            color: var(--text-muted) !important;
        }

        /* --- Buttons --- */
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.7rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
            color: #fff;
        }

        .btn-accent:active {
            transform: translateY(0);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.45rem 0.85rem;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .btn-danger-ghost {
            background: transparent;
            color: var(--danger);
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 0.45rem 0.65rem;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }

        .btn-danger-ghost:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* --- Auth Pages --- */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: rgba(33, 36, 47, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-card h1 {
            font-size: 1.65rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .auth-card .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .form-label-custom {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 3.5rem 1.5rem;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .empty-state p {
            font-size: 0.85rem;
            max-width: 280px;
            margin: 0 auto;
        }

        /* --- Filter Pills --- */
        .filter-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-pill {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .filter-pill:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* --- Alert Messages --- */
        .alert-custom {
            border-radius: 12px;
            border: 1px solid;
            padding: 0.85rem 1.25rem;
            font-size: 0.88rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        /* --- Utility --- */
        .text-accent { color: var(--accent-hover); }
        .text-muted-custom { color: var(--text-muted); }
        .text-secondary-custom { color: var(--text-secondary); }

        .main-content {
            position: relative;
            z-index: 1;
            padding: 2rem 0 4rem;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .auth-card { padding: 1.75rem; }
            .stat-card .stat-number { font-size: 1.4rem; }
            .task-item { padding: 0.85rem 1rem; }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar (shown only if user is authenticated) -->
    {% if user.is_authenticated %}
    <nav class="navbar-custom">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between">
                <a href="{% url 'dashboard' %}" class="navbar-brand-custom">
                    <span class="brand-icon"><i class="bi bi-check2-square"></i></span>
                    TaskFlow
                </a>

                <div class="d-flex align-items-center gap-1">
                    <a href="{% url 'dashboard' %}" class="nav-link-custom {% block nav_dashboard %}{% endblock %}">
                        <i class="bi bi-grid-1x2 me-1"></i> Dashboard
                    </a>
                    <a href="{% url 'task_list' %}" class="nav-link-custom {% block nav_tasks %}{% endblock %}">
                        <i class="bi bi-list-task me-1"></i> All Tasks
                    </a>
                    <a href="{% url 'logout' %}" class="nav-link-custom ms-2" style="color: var(--danger) !important;">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
